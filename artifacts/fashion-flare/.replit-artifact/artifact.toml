kind = "web"
previewPath = "/"
title = "Fashion Flare"
version = "1.0.0"
id = "artifacts/fashion-flare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19532

[services.development]
run = "pnpm --filter @workspace/fashion-flare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fashion-flare", "run", "build" ]
publicDir = "artifacts/fashion-flare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19532"
BASE_PATH = "/"
